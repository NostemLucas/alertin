# ============================================================================
# SOC Alerting System - Docker Compose (Punto de Entrada Único)
# ============================================================================
# Levanta todo el stack: docker-compose up -d
# Solo infraestructura:  docker-compose up -d postgres redis
# Ver logs:              docker-compose logs -f
# ============================================================================

version: '3.8'

services:
  # ==========================================================================
  # PostgreSQL - Base de datos principal
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: soc-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_ENV}
      POSTGRES_DB: ${POSTGRES_DB:-soc_alerting}
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_MAX_CONNECTIONS: 100

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc_user"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - soc-network

  # ==========================================================================
  # Redis - Cache y Cola de Tareas
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: soc-redis
    restart: unless-stopped

    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    ports:
      - "${REDIS_PORT:-6379}:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

    networks:
      - soc-network

  # ==========================================================================
  # SOC Alerting API (FastAPI) - Comentado por defecto
  # Descomenta para ejecutar la app en Docker
  # ==========================================================================
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #
  #   container_name: soc-api
  #   restart: unless-stopped
  #
  #   environment:
  #     DATABASE_URL: postgresql://soc_user:${POSTGRES_PASSWORD}@postgres:5432/soc_alerting
  #     REDIS_URL: redis://redis:6379/0
  #     NIST_API_KEY: ${NIST_API_KEY:-}
  #     LOG_LEVEL: ${LOG_LEVEL:-INFO}
  #
  #   volumes:
  #     - ./logs:/app/logs
  #
  #   ports:
  #     - "8000:8000"
  #
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #
  #   networks:
  #     - soc-network

# ============================================================================
# Volumes (Persistencia)
# ============================================================================
volumes:
  postgres_data:
    driver: local

  redis_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  soc-network:
    driver: bridge
