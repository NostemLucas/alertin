services:
  postgres:
    image: postgres:16-alpine
    container_name: soc_alerting_db
    environment:
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: soc_alerting
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"  # Changed to 5433 to avoid conflict with local PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc_user -d soc_alerting"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: soc_alerting_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@soc-alerting.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - soc_network
    profiles:
      - tools # Only start with: docker-compose --profile tools up

volumes:
  postgres_data:
    driver: local

networks:
  soc_network:
    driver: bridge
