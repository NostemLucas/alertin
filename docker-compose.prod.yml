# Docker Compose for PRODUCTION environment
# Features: Optimized builds, health checks, resource limits, restart policies

services:
  # SOC Alerting Application (Production)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production # Use production stage
    container_name: soc_alerting_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://soc_user:${DB_PASSWORD}@postgres:5432/soc_alerting
      - NIST_API_KEY=${NIST_API_KEY}
      - LOG_LEVEL=INFO
      - LOG_JSON=true
      - PYTHONPATH=/app
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - soc_network
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from soc_alerting.database.connection import get_database; exit(0 if get_database().health_check() else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: >
      sh -c "
        echo 'Running migrations...' &&
        alembic upgrade head &&
        echo 'Starting application...' &&
        python -m soc_alerting.main
      "

  # PostgreSQL Database (Production)
  postgres:
    image: postgres:16-alpine
    container_name: soc_alerting_db
    environment:
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: soc_alerting
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups # For database backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soc_user -d soc_alerting"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - soc_network
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis for caching (Production)
  redis:
    image: redis:7-alpine
    container_name: soc_alerting_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - soc_network
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 1G

  # Nginx reverse proxy (optional but recommended)
  nginx:
    image: nginx:alpine
    container_name: soc_alerting_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - soc_network
    restart: always
    profiles:
      - nginx

  # Database backup service (runs daily)
  db_backup:
    image: postgres:16-alpine
    container_name: soc_alerting_backup
    environment:
      POSTGRES_USER: soc_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: soc_alerting
      PGHOST: postgres
    volumes:
      - ./backups:/backups
    networks:
      - soc_network
    profiles:
      - backup
    command: >
      sh -c "
        while true; do
          echo 'Running backup...' &&
          pg_dump -U soc_user -h postgres soc_alerting > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql &&
          echo 'Backup completed' &&
          find /backups -name 'backup_*.sql' -mtime +7 -delete &&
          sleep 86400;
        done
      "

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  soc_network:
    driver: bridge
