# ============================================================================
# SOC Alerting System - CVE Scraper Only (Minimal Setup)
# ============================================================================
# Este docker-compose ejecuta solo el scraper + infraestructura mínima
# El resto de servicios (processor, alert-manager, api) corren localmente
# ============================================================================

services:
  # ==========================================================================
  # INFRASTRUCTURE: Kafka
  # ==========================================================================
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: soc-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    networks:
      - soc-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  # ==========================================================================
  # INFRASTRUCTURE: Kafka Topic Creator
  # ==========================================================================
  kafka-init:
    image: confluentinc/cp-kafka:latest
    container_name: soc-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infrastructure/kafka/create-topics.sh:/create-topics.sh
    command: bash -c "chmod +x /create-topics.sh && /create-topics.sh"
    networks:
      - soc-network

  # ==========================================================================
  # INFRASTRUCTURE: PostgreSQL
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: soc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soc_password}
      POSTGRES_DB: ${POSTGRES_DB:-soc_alerting}
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_MAX_CONNECTIONS: 200
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-soc_user} -d ${POSTGRES_DB:-soc_alerting}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc-network

  # ==========================================================================
  # INFRASTRUCTURE: Kafka UI (Opcional - Para monitoreo)
  # ==========================================================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: soc-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: soc-alerting
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - soc-network

  # ==========================================================================
  # SERVICE: CVE Scraper (NIST/CISA)
  # ==========================================================================
  cve-scraper:
    build:
      context: .
      dockerfile: ./services/cve-scraper/Dockerfile
    container_name: soc-cve-scraper
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    # volumes:
      # NOTA: Los volúmenes están comentados porque sobrescriben las dependencias
      # instaladas por Poetry durante el build. Si necesitas desarrollo en vivo,
      # usa la Opción 2 (ver README)
      # - ./services/cve-scraper/src:/app
      # - ./shared:/app/shared
    environment:
      # NIST API
      NIST_API_KEY: ${NIST_API_KEY:-}
      NIST_RATE_LIMIT_DELAY: ${NIST_RATE_LIMIT_DELAY:-6.0}

      # Kafka (conexión desde Docker)
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_CLIENT_ID: cve-scraper

      # Database (conexión desde Docker)
      DATABASE_URL: postgresql://${POSTGRES_USER:-soc_user}:${POSTGRES_PASSWORD:-soc_password}@postgres:5432/${POSTGRES_DB:-soc_alerting}

      # Scheduler
      SCRAPER_INTERVAL_MINUTES: ${SCRAPER_INTERVAL_MINUTES:-60}
      SCRAPER_HOURS_BACK: ${SCRAPER_HOURS_BACK:-24}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - soc-network

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  soc-network:
    driver: bridge
