# Alembic Configuration File
# For SOC Alerting System Database Migrations

[alembic]
# Path to migration scripts
script_location = shared/database/migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generating revision timestamps (e.g. 'UTC', 'America/New_York')
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Version path separator (use 'os' for OS-default, or a custom character)
version_path_separator = os

# Set to 'true' to search source files recursively in each "version_locations" directory
# New in Alembic version 1.10
# recursive_version_locations = false

# Database URL - Will be overridden by env.py from .env file
# This is just a placeholder, the actual URL comes from DATABASE_URL environment variable
sqlalchemy.url = postgresql://user:pass@localhost/dbname


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
